// ── Bonus Pool Logic ──────────────────────────────────────────────────────────
// Group = same Tier × same direct Manager
// Pool  = sum of 1 month salary (annual/12) of all group members
// Each person's bonus = pool × (their factor / sum of all factors in group)

const getGroup = (personId) => {
  const person = ORG.find(p=>p.id===personId);
  if (!person) return [];
  // same tier, same managerId
  return ORG.filter(p => p.tier===person.tier && p.managerId===person.managerId);
};

const calcGroupBonus = (reviews) => {
  // Returns { personId: bonusAmount } for all people
  const result = {};
  // Collect distinct groups (tier + managerId combos)
  const seen = new Set();
  ORG.forEach(person => {
    const key = `${person.tier}::${person.managerId||"none"}`;
    if (seen.has(key)) return;
    seen.add(key);
    const group = getGroup(person.id);
    // Pool = sum of monthly salary of all members
    const pool = group.reduce((s,p) => s + Math.round(p.salary/12), 0);
    // Each member's factor (0 if no grade yet)
    const factors = group.map(p => {
      const g = reviews[p.id]?.mgrGrade;
      return { id:p.id, factor: g ? (RATINGS.find(r=>r.grade===g)?.factor||0) : 0 };
    });
    const totalFactor = factors.reduce((s,f)=>s+f.factor, 0);
    factors.forEach(f => {
      result[f.id] = totalFactor > 0 ? Math.round(pool * f.factor / totalFactor) : 0;
    });
  });
  return result;
};

const calcWeighted = s => s ? DIMENSIONS.reduce((a,d) => a+(s[d.key]||3)*d.weight, 0) : null;

// Cross score: average overall from all cross reviewers (self-nominated + HR-assigned)
const calcCrossAvg = r => {
  if (!r?.crossReviews?.length) return null;
  return r.crossReviews.reduce((a,x)=>a+x.scores.overall,0)/r.crossReviews.length;
};

const calcFinal = r => {
  if (!r) return null;
  const self = calcWeighted(r.selfScores), mgr = calcWeighted(r.mgrScores);
  if (!self || !mgr) return null;
  const cross = calcCrossAvg(r) ?? mgr;
  return parseFloat((self*0.10 + mgr*0.70 + cross*0.20).toFixed(2));
};
const avg = arr => arr?.length ? arr.reduce((a,b)=>a+b,0)/arr.length : null;
const calcRaise = (grade, salary) => {
  const r = RATINGS.find(x=>x.grade===grade); if (!r) return null;

};

// ── Org Tree Node ─────────────────────────────────────────────────────────────
function OrgNode({person, reviews, depth=0, expandedId, setExpandedId}) {
  const rev = reviews[person.id];
  const reports = getDirectReports(person.id);
  const tc = TIER_COLORS[person.tier];
  const fs = calcFinal(rev);
  const isExpanded = expandedId === person.id;

  return (
    <div style={{marginLeft: depth * 20}}>
      <div onClick={()=>setExpandedId(isExpanded ? null : person.id)}
        style={{
          display:"flex", alignItems:"center", gap:10, padding:"10px 14px",
          background: isExpanded ? `${tc}18` : T.surfaceAlt,
          borderRadius:T.radius, border:`1px solid ${isExpanded ? tc+"66" : T.border}`,
          marginBottom:6, cursor:"pointer",
        }}>
        {depth > 0 && <span style={{color:T.textDim, fontSize:10}}>{'└'}</span>}
        <Avatar initials={person.avatar} color={tc} size={30}/>
        <div style={{flex:1}}>
          <p style={{margin:0,fontSize:12,fontWeight:700,color:T.text}}>{person.name}</p>
          <p style={{margin:0,fontSize:10,color:T.textMuted}}>{person.title}</p>
        </div>
        <Badge color={phaseBadgeColor[rev?.phase]||T.textMuted}>{phaseLabel[rev?.phase]||"—"}</Badge>
        {rev?.mgrGrade && <span style={{fontWeight:900,fontSize:16,color:gradeColor[rev.mgrGrade]}}>{rev.mgrGrade}</span>}
        {fs && <span style={{fontSize:12,color:T.textMuted}}>{fs.toFixed(2)}</span>}
        <span style={{color:T.textDim,fontSize:11}}>{isExpanded?"▲":"▼"}</span>
      </div>
      {isExpanded && reports.length > 0 && (
        <div style={{marginBottom:8}}>
          {reports.map(r => (
            <OrgNode key={r.id} person={r} reviews={reviews} depth={depth+1}
              expandedId={expandedId} setExpandedId={setExpandedId}/>
          ))}
        </div>
      )}
    </div>
  );
}

// ── Timeline ──────────────────────────────────────────────────────────────────
function CycleTimeline({cycle}) {
  if (!cycle?.phases) return null;
  const today = new Date();
  return (
    <Card style={{marginBottom:14}}>
      <SectionTitle sub={`Active cycle · ${cycle.label}`}>📅 Review Timeline</SectionTitle>
      <div style={{position:"relative",paddingLeft:20}}>
        <div style={{position:"absolute",left:9,top:0,bottom:0,width:2,background:T.border}}/>
        {cycle.phases.map(ph => {
          const isPast = new Date(ph.deadline) < today;
          const days = daysUntil(ph.deadline);
          const isNear = days>=0&&days<=5;
          const dotColor = isPast?T.green:isNear?T.amber:T.accent;
          return (
            <div key={ph.key} style={{position:"relative",marginBottom:12,paddingLeft:14}}>
              <div style={{position:"absolute",left:-11,top:3,width:10,height:10,borderRadius:"50%",
                background:dotColor,border:`2px solid ${T.surface}`,boxShadow:isNear?`0 0 6px ${T.amber}`:"none"}}/>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:12,fontWeight:600,color:isPast?T.textMuted:T.text}}>{ph.label}</span>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  {isPast?<Pill color={T.green}>✓ Done</Pill>
                    :isNear?<Pill color={T.amber}>⚡ {days}d left</Pill>
                    :<Pill color={T.textMuted}>{days}d</Pill>}
                  <span style={{fontSize:10,color:T.textDim}}>{ph.deadline}</span>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </Card>
  );
}

// ── Notification Bell ─────────────────────────────────────────────────────────
const INIT_NOTIFS = Object.fromEntries(
  ORG.map(p => [p.id, [{
    id:"n"+p.id,
    type: p.tier===1 ? "info" : "warning",
    title: p.tier===1 ? "HR Calibration Pending" : "Self Review Due",
    body: p.tier===1 ? "Your performance calibration will be set by HR." : "Complete your self review by Mar 20.",
    time:"now", read:false
  }]])
);

function NotificationBell({userId,notifications,setNotifications}) {
  const [open,setOpen]=useState(false);
  const notifs = notifications[userId]||[];
  const unread = notifs.filter(n=>!n.read).length;
  const typeIcon={info:"ℹ️",success:"✅",warning:"⚠️"};
  const typeColor={info:T.blue,success:T.green,warning:T.amber};
  const markRead = id => setNotifications(prev=>({...prev,[userId]:prev[userId].map(n=>n.id===id?{...n,read:true}:n)}));
  return (
    <div style={{position:"relative"}}>
      <button onClick={()=>setOpen(!open)} style={{position:"relative",background:T.surfaceAlt,border:`1px solid ${T.border}`,borderRadius:T.radiusSm,padding:"6px 10px",cursor:"pointer",color:T.text}}>
        🔔{unread>0&&<span style={{position:"absolute",top:-4,right:-4,background:T.red,color:"#fff",fontSize:9,fontWeight:800,borderRadius:"50%",width:16,height:16,display:"flex",alignItems:"center",justifyContent:"center"}}>{unread}</span>}
      </button>
      {open&&(
        <div style={{position:"absolute",right:0,top:"110%",width:320,zIndex:100,background:T.surface,border:`1px solid ${T.border}`,borderRadius:T.radiusLg,boxShadow:T.shadowMd,overflow:"hidden"}}>
          <div style={{padding:"12px 16px",borderBottom:`1px solid ${T.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontWeight:700,fontSize:13,color:T.text}}>Notifications</span>
            {unread>0&&<Pill color={T.red}>{unread} new</Pill>}
          </div>
          <div style={{maxHeight:320,overflowY:"auto"}}>
            {notifs.length===0?<p style={{textAlign:"center",color:T.textMuted,padding:24,fontSize:12}}>No notifications</p>
              :notifs.map(n=>(
                <div key={n.id} onClick={()=>markRead(n.id)} style={{padding:"12px 16px",borderBottom:`1px solid ${T.border}`,background:n.read?"transparent":T.accent+"0A",cursor:"pointer"}}>
                  <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                    <span style={{fontSize:14}}>{typeIcon[n.type]}</span>
                    <div style={{flex:1}}>
                      <p style={{margin:"0 0 2px",fontSize:12,fontWeight:700,color:n.read?T.textMuted:T.text}}>{n.title}</p>
                      <p style={{margin:"0 0 4px",fontSize:11,color:T.textMuted,lineHeight:1.4}}>{n.body}</p>
                      <span style={{fontSize:10,color:T.textDim}}>{n.time}</span>
                    </div>
                    {!n.read&&<div style={{width:6,height:6,borderRadius:"50%",background:typeColor[n.type],flexShrink:0,marginTop:3}}/>}
                  </div>
                </div>
              ))
            }
          </div>
        </div>
      )}
    </div>
  );
}

            <div>

            </div>
            <div style={{marginLeft:"auto"}}>

      {/* Team tab — shows their direct reports' status */}

    </div>

}

// ── Reporting View — manager reviews their direct reports ─────────────────────
// Recursively collect all descendants
const getSubtree = (rootId) => {
  const result = [];
  const queue = [...getDirectReports(rootId)];
  while (queue.length) {
    const p = queue.shift();
    result.push(p);
    queue.push(...getDirectReports(p.id));
  }
  return result;
};

function UpwardReviewForm({personId, reviews, setReviews, upwardReviews, setUpwardReviews}) {
  const person = ORG.find(p=>p.id===personId);
  const myMgr = getManager(personId);
  const [scores,setScores]=useState(initUpward());
  const [comment,setComment]=useState("");
  const [done,setDone]=useState(reviews[personId]?.upwardSubmitted||false);

  if (!myMgr) return (
    <Card>
      <p style={{textAlign:"center",color:T.textMuted,padding:24,fontSize:13}}>
        No upward review applicable — {person?.name} has no direct manager.
      </p>
    </Card>
  );

  const submit = () => {
    const prev = upwardReviews[myMgr.id]||[];
    setUpwardReviews({...upwardReviews,[myMgr.id]:[...prev,{scores,comment,reviewerId:personId}]});
    setReviews({...reviews,[personId]:{...reviews[personId],upwardSubmitted:true}});
    setDone(true);
  };

  return (
    <Card>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
        <span>⬆️</span>
        <p style={{margin:0,fontSize:13,fontWeight:700,color:T.text}}>Upward Review — {myMgr.name} ({myMgr.title})</p>
        <Badge color={T.teal}>Anonymous</Badge>
      </div>
      <p style={{margin:"0 0 14px",fontSize:12,color:T.textMuted}}>Fully anonymous. Manager sees aggregated results only.</p>
      {done?(
        <div style={{padding:16,background:`${T.teal}18`,borderRadius:T.radius,border:`1px solid ${T.teal}44`,textAlign:"center"}}>
          <p style={{margin:"0 0 4px",fontSize:14,fontWeight:700,color:T.teal}}>✅ Submitted</p>
          <p style={{margin:0,fontSize:12,color:T.textMuted}}>Thank you for your feedback.</p>
        </div>
      ):(
        <>
          {UPWARD_DIMENSIONS.map(d=>(
            <Slider key={d.key} label={d.label} value={scores[d.key]} color={T.teal} onChange={v=>setScores({...scores,[d.key]:v})}/>
          ))}
          <div style={{padding:"10px 14px",background:T.surfaceAlt,borderRadius:T.radiusSm,marginBottom:14}}>
            <span style={{fontSize:13,color:T.teal,fontWeight:700}}>Average: {avg(Object.values(scores))?.toFixed(2)} / 5.00</span>
          </div>
          <textarea rows={3} value={comment} onChange={e=>setComment(e.target.value)}
            placeholder="Any thoughts on your manager's leadership style or team environment?"
            style={{width:"100%",padding:"10px 14px",borderRadius:T.radius,border:`1px solid ${T.border}`,background:T.surfaceAlt,color:T.text,fontSize:13,fontFamily:"inherit",resize:"vertical",boxSizing:"border-box",marginBottom:12}}/>
          <Btn variant="teal" onClick={submit}>Submit Anonymous Upward Review</Btn>
        </>
      )}
    </Card>
  );
}

function HRPeopleEditor({nameOverrides, setNameOverrides, orgOverrides, setOrgOverrides}) {
  const dn = (id) => nameOverrides?.[id] || ORG.find(p=>p.id===id)?.name || "";
  const [editingId, setEditingId] = useState(null);
  const [editTitle, setEditTitle] = useState("");
  const [editTier, setEditTier] = useState(1);
  const [editMgr, setEditMgr] = useState(null);
  const [filterTier, setFilterTier] = useState(0);
  const [search, setSearch] = useState("");

  const getEff = (p) => ({...p, ...(orgOverrides[p.id]||{})});

  const startEdit = (p) => {
    const e = getEff(p);
    setEditingId(p.id);
    setEditTitle(e.title);
    setEditTier(e.tier);
    setEditMgr(e.managerId||null);
  };

  const handleTitleChange = (val) => { setEditTitle(val); };

  const saveEdit = (id) => {
    setOrgOverrides(prev=>({...prev,[id]:{title:editTitle, tier:editTier, managerId:editMgr||null}}));
    setEditingId(null);
  };
  const resetOne = (id) => setOrgOverrides(prev=>{const n={...prev};delete n[id];return n;});

  const changed = Object.keys(orgOverrides).length;
  const filtered = ORG.map(p=>getEff(p))
    .filter(p=>(filterTier===0||p.tier===filterTier)&&(search===""||p.name.toLowerCase().includes(search.toLowerCase())||p.title.toLowerCase().includes(search.toLowerCase())));

  return (
    <Card>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6,flexWrap:"wrap"}}>
        <SectionTitle sub="Edit tier and reporting line per employee">👥 People & Tier Management</SectionTitle>
        {changed>0&&<Pill color={T.amber}>{changed} change{changed>1?"s":""}</Pill>}
      </div>
      <p style={{margin:"0 0 14px",fontSize:12,color:T.textMuted,lineHeight:1.6}}>
        Changes apply to this session. Tier affects bonus pool grouping, cross-team review eligibility, and review hierarchy.
      </p>

      {/* Filters */}
      <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search name or title..."

        <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
          {[{v:0,l:"All"},{v:1,l:"CEO"},{v:2,l:"Exec"},{v:3,l:"Manager"},{v:4,l:"Team Member"}].map(({v,l})=>(
            <button key={v} onClick={()=>setFilterTier(v)} style={{
              padding:"5px 10px",borderRadius:T.radiusSm,fontFamily:"inherit",fontSize:11,fontWeight:700,cursor:"pointer",border:"none",
              background:filterTier===v?(v===0?T.accent:TIER_COLORS[v]||T.accent):"transparent",
              color:filterTier===v?"#fff":T.textMuted,
            }}>{l}</button>
          ))}
        </div>
      </div>

      <div style={{overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
          <thead>
            <tr>{["Employee","Title","Tier","Reports To","Actions"].map(h=>(
              <th key={h} style={{padding:"7px 10px",textAlign:"left",fontSize:10,fontWeight:700,color:T.textMuted,borderBottom:`1px solid ${T.border}`,whiteSpace:"nowrap"}}>{h}</th>
            ))}</tr>
          </thead>
          <tbody>
            {filtered.map(p=>{
              const isEditing = editingId===p.id;
              const isChanged = !!orgOverrides[p.id];
              const mgrPerson = p.managerId ? ORG.find(x=>x.id===p.managerId) : null;
              const eligibleMgrs = ORG.filter(x=>x.id!==p.id);
              return (
                <tr key={p.id} style={{borderBottom:`1px solid ${T.border}`,background:isEditing?`${T.accent}0A`:isChanged?`${T.amber}08`:"transparent"}}>
                  <td style={{padding:"8px 10px"}}>
                    <div style={{display:"flex",alignItems:"center",gap:7}}>
                      <Avatar initials={p.avatar} size={26} color={TIER_COLORS[p.tier]}/>
                      <div>
                        <div style={{display:"flex",alignItems:"center",gap:5}}>
                          <p style={{margin:0,fontWeight:600,color:T.text,fontSize:12}}>{dn(p.id)}</p>
                          {nameOverrides?.[p.id]&&<span style={{fontSize:9,color:T.accent,border:`1px solid ${T.accent}44`,borderRadius:3,padding:"1px 4px"}}>nickname</span>}
                        </div>
                        <p style={{margin:0,fontSize:10,color:T.textDim,fontFamily:"monospace"}}>#{p.id}</p>
                        {isChanged&&<span style={{fontSize:9,color:T.amber}}>● modified</span>}
                      </div>
                    </div>
                  </td>
                  <td style={{padding:"8px 10px",minWidth:200}}>
                    {isEditing ? (
                      <select value={editTitle} onChange={e=>handleTitleChange(e.target.value)}
                        style={{background:T.surfaceAlt,color:T.text,border:`1px solid ${T.accent}`,borderRadius:T.radiusSm,padding:"4px 8px",fontSize:11,fontFamily:"inherit",outline:"none",maxWidth:220,width:"100%"}}>
                        <option value={editTitle}>{editTitle}</option>
                        <optgroup label="── Frontline ──">
                          {FRONTLINE_TITLES.map(t=><option key={t} value={t}>{t}</option>)}
                        </optgroup>
                        <optgroup label="── Other ──">
                          {OTHER_TITLES.map(t=><option key={t} value={t}>{t}</option>)}
                        </optgroup>
                      </select>
                    ) : <span style={{color:T.textMuted,fontSize:11}}>{p.title}</span>}
                  </td>
                  <td style={{padding:"8px 10px",minWidth:130}}>
                    {isEditing ? (
                      <select value={editTier} onChange={e=>setEditTier(Number(e.target.value))}
                        style={{background:T.surfaceAlt,color:T.text,border:`1px solid ${T.accent}`,borderRadius:T.radiusSm,padding:"4px 8px",fontSize:11,fontFamily:"inherit",outline:"none"}}>
                        {[1,2,3,4].map(t=><option key={t} value={t}>{TIER_LABELS[t]}</option>)}
                      </select>
                    ) : <Badge color={TIER_COLORS[p.tier]}>{TIER_LABELS[p.tier]}</Badge>}
                  </td>
                  <td style={{padding:"8px 10px",minWidth:180}}>
                    {isEditing ? (
                      <select value={editMgr||""} onChange={e=>setEditMgr(e.target.value||null)}
                        style={{background:T.surfaceAlt,color:T.text,border:`1px solid ${T.accent}`,borderRadius:T.radiusSm,padding:"4px 8px",fontSize:11,fontFamily:"inherit",outline:"none",maxWidth:220}}>
                        <option value="">— No manager (HR calibrates) —</option>
                        {eligibleMgrs.map(m=><option key={m.id} value={m.id}>{m.name} · {m.title}</option>)}
                      </select>
                    ) : <span style={{color:mgrPerson?T.text:T.amber,fontSize:11}}>{mgrPerson?.name||"HR Calibrates"}</span>}
                  </td>
                  <td style={{padding:"8px 10px",minWidth:120}}>
                    {isEditing ? (
                      <div style={{display:"flex",gap:6}}>
                        <Btn small onClick={()=>saveEdit(p.id)} style={{background:T.green,color:"#0F2B20",border:"none"}}>Save</Btn>
                        <Btn small variant="secondary" onClick={()=>setEditingId(null)}>Cancel</Btn>
                      </div>
                    ) : (
                      <div style={{display:"flex",gap:6}}>
                        <Btn small variant="ghost" onClick={()=>startEdit(ORG.find(x=>x.id===p.id))}>Edit</Btn>
                        {isChanged&&<Btn small variant="secondary" onClick={()=>resetOne(p.id)}>Reset</Btn>}
                      </div>
                    )}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </Card>
  );
}

// ── HR Dashboard ──────────────────────────────────────────────────────────────
function HRView({reviews, setReviews, upwardReviews, nominations, assignments, setAssignments, nameOverrides, setNameOverrides, orgOverrides, setOrgOverrides}) {
  const dn = (id) => nameOverrides?.[id] || ORG.find(p=>p.id===id)?.name || "";
  const [tab,setTab]=useState("org");
  const [expandedId,setExpandedId]=useState(null);
  const [mgrSel,setMgrSel]=useState(ORG.filter(p=>p.tier<4)[0]?.id||null);
  const ceo = ORG.find(p=>p.tier===1);
  const gradeCounts={A:0,B:0,C:0,D:0};
  ORG.forEach(p=>{if(reviews[p.id]?.mgrGrade)gradeCounts[reviews[p.id].mgrGrade]++;});
  const mgrUpward = mgrSel?(upwardReviews[mgrSel]||[]):[];
  const mgrAvgByDim = UPWARD_DIMENSIONS.map(d=>({...d,avg:mgrUpward.length?avg(mgrUpward.map(r=>r.scores[d.key])):null}));
  const bonusMap = calcGroupBonus(reviews);
  const totalBonus = Object.values(bonusMap).reduce((s,v)=>s+v,0);

  // Export to CSV
  const exportCSV = (type) => {
    let headers, rows;
    if (type === "scores") {
      headers = ["Name","Title","Tier","Team","Reports To","Phase","Grade","Final Score","Self Score","Mgr Score","Suggested Bonus","Suggested Raise %"];
      rows = ORG.map(p => {
        const r = reviews[p.id]; const mgr = getManager(p.id);
        const fs = calcFinal(r); const bonus = bonusMap[p.id]; const raise = calcRaise(r?.mgrGrade, p.salary);
        return [dn(p.id), p.title, TIER_LABELS[p.tier], p.team, dn(mgr?.id)||"(HR Calibrates)",
          phaseLabel[r?.phase]||"—", r?.mgrGrade||"—", fs?.toFixed(2)||"—",
          calcWeighted(r?.selfScores)?.toFixed(2)||"—", calcWeighted(r?.mgrScores)?.toFixed(2)||"—",
          bonus ? `¥${bonus}` : "—", raise ? `+${raise.pct}%` : "—"];
      });
    } else {
      headers = ["Manager","Manager Title","Reviewer","Reviewer Title","Clarity","Support","Feedback","Fairness","Growth","Trust","Avg","Comment"];
      rows = [];
      ORG.filter(p=>p.tier<4).forEach(mgr => {
        (upwardReviews[mgr.id]||[]).forEach(r => {
          const reviewer = ORG.find(p=>p.id===r.reviewerId);
          const scores = Object.values(r.scores);
          rows.push([dn(mgr.id), mgr.title, dn(reviewer?.id)||"Unknown", reviewer?.title||"—",
            ...UPWARD_DIMENSIONS.map(d=>r.scores[d.key]),
            (scores.reduce((a,b)=>a+b,0)/scores.length).toFixed(2),
            r.comment||""]);
        });
      });
    }
    const csv = [headers, ...rows].map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
    const blob = new Blob([csv], {type:"text/csv"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url;
    a.download = `PR_2026H1_${type}_${new Date().toISOString().slice(0,10)}.csv`;
    a.click(); URL.revokeObjectURL(url);
  };

  const hrTabs=[{id:"org",label:"📊 Overview"},{id:"people",label:"👥 People & Tiers"},{id:"compensation",label:"💰 Compensation"},{id:"upward",label:"⬆️ Upward Reviews"},{id:"export",label:"📥 Export"}];

  return (
    <div>
      <div style={{display:"flex",gap:2,marginBottom:16,background:T.surfaceAlt,borderRadius:T.radius,padding:4,flexWrap:"wrap"}}>
        {hrTabs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,minWidth:80,padding:"8px 6px",borderRadius:T.radiusSm,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"inherit",background:tab===t.id?T.surface:"transparent",color:tab===t.id?T.accent:T.textMuted}}>
            {t.label}
          </button>
        ))}
      </div>

      {/* ── Overview / Analytics ── */}
      {tab==="org"&&(()=>{
        const total = ORG.length;
        const graded = ORG.filter(p=>reviews[p.id]?.mgrGrade).length;
        const phaseBreakdown = Object.entries(
          ORG.reduce((acc,p)=>{ const ph=reviews[p.id]?.phase||"self"; acc[ph]=(acc[ph]||0)+1; return acc; },{})
        ).sort((a,b)=>["self","manager","cross","hr_calibration","done"].indexOf(a[0])-["self","manager","cross","hr_calibration","done"].indexOf(b[0]));

        // Grade distribution overall + per tier
        const gradesByTier = [1,2,3,4].map(tier=>{
          const people = ORG.filter(p=>p.tier===tier);
          const counts = {A:0,B:0,C:0,D:0,pending:0};
          people.forEach(p=>{ const g=reviews[p.id]?.mgrGrade; if(g) counts[g]++; else counts.pending++; });
          return {tier, people:people.length, counts};
        });

        // Dimension avg scores across all graded people
        const dimAvgs = DIMENSIONS.map(d=>{
          const vals = ORG.map(p=>reviews[p.id]?.mgrScores?.[d.key]).filter(Boolean);
          return {...d, avg: vals.length ? (vals.reduce((a,b)=>a+b,0)/vals.length) : null, n: vals.length};
        });

        // Top performers (final score)
        const ranked = ORG
          .map(p=>({...p, fs: calcFinal(reviews[p.id])}))
          .filter(p=>p.fs)
          .sort((a,b)=>b.fs-a.fs);

        // Phase progress bar width helper
        const phaseOrder = ["self","manager","cross","hr_calibration","done"];
        const phaseColors = {self:T.accent,manager:T.amber,cross:T.purple,hr_calibration:"#C084FC",done:T.green};

        return (
          <>
            {/* KPI row */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:14}}>
              {[
                {label:"Total Employees", val:total, color:T.accent, icon:"👥"},
                {label:"Reviews Completed", val:`${graded}/${total}`, color:T.green, icon:"✅"},
                {label:"Avg Final Score", val: ranked.length?(ranked.reduce((s,p)=>s+p.fs,0)/ranked.length).toFixed(2):"—", color:T.blue, icon:"📈"},
                {label:"Pending Self Review", val: ORG.filter(p=>reviews[p.id]?.phase==="self"&&p.tier!==1).length, color:T.amber, icon:"⏳"},
              ].map(k=>(
                <Card key={k.label} style={{padding:"14px 12px",textAlign:"center",marginBottom:0}}>
                  <div style={{fontSize:20,marginBottom:4}}>{k.icon}</div>
                  <div style={{fontSize:22,fontWeight:900,color:k.color}}>{k.val}</div>
                  <div style={{fontSize:10,color:T.textMuted,marginTop:4}}>{k.label}</div>
                </Card>
              ))}
            </div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
              {/* Phase breakdown */}
              <Card style={{marginBottom:0}}>
                <SectionTitle sub="Current cycle progress">📋 Review Phase Progress</SectionTitle>
                {phaseBreakdown.map(([ph,count])=>{
                  const pct = Math.round(count/total*100);
                  const color = phaseColors[ph]||T.textMuted;
                  return (
                    <div key={ph} style={{marginBottom:10}}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                        <span style={{fontSize:12,color:T.text,fontWeight:600}}>{phaseLabel[ph]||ph}</span>
                        <span style={{fontSize:12,color:T.textMuted}}>{count} <span style={{color:T.textDim}}>({pct}%)</span></span>
                      </div>
                      <div style={{height:8,background:T.border,borderRadius:4,overflow:"hidden"}}>
                        <div style={{width:`${pct}%`,height:"100%",background:color,borderRadius:4,transition:"width 0.3s"}}/>
                      </div>
                    </div>
                  );
                })}
              </Card>

              {/* Grade distribution per tier */}
              <Card style={{marginBottom:0}}>
                <SectionTitle sub="Manager-assigned grades by tier">🏅 Grade Distribution</SectionTitle>
                {gradesByTier.map(({tier,people,counts})=>(
                  <div key={tier} style={{marginBottom:12}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                      <span style={{fontSize:10,fontWeight:700,color:TIER_COLORS[tier],textTransform:"uppercase",minWidth:90}}>{TIER_LABELS[tier]}</span>
                      <span style={{fontSize:10,color:T.textDim}}>{people} people</span>
                    </div>
                    <div style={{display:"flex",gap:1,height:20,borderRadius:4,overflow:"hidden",background:T.border}}>
                      {["A","B","C","D"].map(g=>{
                        const pct = people>0?(counts[g]/people*100):0;
                        return pct>0?(
                          <div key={g} style={{width:`${pct}%`,background:gradeColor[g],display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:900,color:"#fff",transition:"width 0.3s"}}>
                            {pct>8?g:""}
                          </div>
                        ):null;
                      })}
                      {counts.pending>0&&(
                        <div style={{flex:1,background:T.surfaceAlt,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,color:T.textDim}}>
                          {counts.pending} pending
                        </div>
                      )}
                    </div>
                    <div style={{display:"flex",gap:8,marginTop:4}}>
                      {["A","B","C","D"].map(g=>counts[g]>0&&(
                        <span key={g} style={{fontSize:10,color:gradeColor[g],fontWeight:700}}>{g}:{counts[g]}</span>
                      ))}
                      {counts.pending>0&&<span style={{fontSize:10,color:T.textDim}}>⏳{counts.pending}</span>}
                    </div>
                  </div>
                ))}
              </Card>
            </div>

            {/* Dimension scores */}
            <Card>
              <SectionTitle sub="Average manager scores across all reviewed employees">📐 Dimension Averages</SectionTitle>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                {dimAvgs.map(d=>(
                  <div key={d.key} style={{padding:"10px 12px",background:T.surfaceAlt,borderRadius:T.radiusSm,border:`1px solid ${T.border}`}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:6,alignItems:"center"}}>
                      <span style={{fontSize:12,color:T.text}}>{d.icon} {d.label}</span>
                      <span style={{fontSize:13,fontWeight:900,color:d.avg?T.accent:T.textDim}}>{d.avg?d.avg.toFixed(2):"—"}</span>
                    </div>
                    <div style={{height:6,background:T.border,borderRadius:3,overflow:"hidden"}}>
                      <div style={{width:d.avg?`${(d.avg/5)*100}%`:"0%",height:"100%",background:T.accent,borderRadius:3}}/>
                    </div>
                    <div style={{fontSize:9,color:T.textDim,marginTop:4}}>{d.n} responses · weight {Math.round(d.weight*100)}%</div>
                  </div>
                ))}
              </div>
            </Card>

            {/* Top 10 performers */}
            {ranked.length>0&&(
              <Card>
                <SectionTitle sub="By final weighted score (self 10% + manager 70% + cross 20%)">🏆 Top Performers</SectionTitle>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                  <thead>
                    <tr>{["#","Name","Title","Tier","Grade","Final Score","Self","Mgr"].map(h=>(
                      <th key={h} style={{padding:"6px 10px",textAlign:"left",fontSize:10,fontWeight:700,color:T.textMuted,borderBottom:`1px solid ${T.border}`}}>{h}</th>
                    ))}</tr>
                  </thead>
                  <tbody>
                    {ranked.slice(0,10).map((p,i)=>{
                      const r=reviews[p.id];
                      return (
                        <tr key={p.id} style={{borderBottom:`1px solid ${T.border}`,background:i===0?`${T.accent}08`:i===1?`${T.accent}04`:"transparent"}}>

                          <td style={{padding:"8px 10px"}}>
                            <div style={{display:"flex",alignItems:"center",gap:6}}>
                              <Avatar initials={p.avatar} size={24} color={TIER_COLORS[p.tier]}/>
                              <span style={{fontWeight:600,color:T.text}}>{dn(p.id)}</span>
                            </div>
                          </td>
                          <td style={{padding:"8px 10px",color:T.textMuted,fontSize:11}}>{p.title}</td>
                          <td style={{padding:"8px 10px"}}><Badge color={TIER_COLORS[p.tier]}>{TIER_LABELS[p.tier]}</Badge></td>
                          <td style={{padding:"8px 10px"}}>{r?.mgrGrade&&<span style={{fontWeight:900,fontSize:15,color:gradeColor[r.mgrGrade]}}>{r.mgrGrade}</span>}</td>
                          <td style={{padding:"8px 10px",fontWeight:900,color:T.accent,fontSize:14}}>{p.fs.toFixed(2)}</td>
                          <td style={{padding:"8px 10px",color:T.textMuted}}>{calcWeighted(r?.selfScores)?.toFixed(2)||"—"}</td>
                          <td style={{padding:"8px 10px",color:T.textMuted}}>{calcWeighted(r?.mgrScores)?.toFixed(2)||"—"}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </Card>
            )}
          </>
        );
      })()}

      {tab==="people"&&<HRPeopleEditor nameOverrides={nameOverrides} setNameOverrides={setNameOverrides} orgOverrides={orgOverrides} setOrgOverrides={setOrgOverrides}/>}

      {/* Export Tab */}
      {tab==="export"&&(
        <>
          <HRCrossAssignPanel nominations={nominations} assignments={assignments} setAssignments={setAssignments} reviews={reviews}/>
          <Card glow>
            <SectionTitle sub="HR internal · download as CSV">📥 Export Data Reports</SectionTitle>

      {tab==="compensation"&&(()=>{
        // Build group pools for display: group by tier + managerId

        const seenKeys = new Set();
        ORG.forEach(p=>{
          const k=`${p.tier}::${p.managerId||"none"}`;
          if(!seenKeys.has(k)){seenKeys.add(k);groupKeys.push({tier:p.tier,managerId:p.managerId,key:k});}
        });
        const graded = ORG.filter(p=>reviews[p.id]?.mgrGrade).length;
        const avgRaisePct = graded>0
          ? (ORG.filter(p=>reviews[p.id]?.mgrGrade).reduce((s,p)=>{const r=calcRaise(reviews[p.id].mgrGrade,p.salary);return s+(r?.pct||0);},0)/graded).toFixed(1)
          : "—";
        return (
          <>
            <div style={{display:"flex",alignItems:"flex-start",gap:10,padding:"12px 16px",background:`${T.amber}12`,border:`1px solid ${T.amber}44`,borderRadius:T.radius,marginBottom:14}}>

              <div>
                <p style={{margin:"0 0 2px",fontSize:12,fontWeight:700,color:T.amber}}>HR Internal · Advisory Only</p>

                  Bonus pool = <strong style={{color:T.text}}>sum of 1 month salary</strong> per group (same Tier + same Manager). Distributed by grade factor: A×1.4 · B×1.0 · C×0.6 · D×0.
                </p>

            </div>
            <Card glow>
              <SectionTitle sub="System estimates · subject to approval">💰 Compensation Summary</SectionTitle>

                {[
                  {label:"Total Bonus Pool",val:`¥${totalBonus.toLocaleString()}`,color:T.green,note:"advisory"},
                  {label:"Avg Suggested Raise",val:`${avgRaisePct}%`,color:T.blue,note:"advisory"},
                  {label:"Graded / Total",val:`${graded}/${ORG.length}`,color:T.accent,note:""},
                ].map(s=>(
                  <div key={s.label} style={{padding:"16px 12px",textAlign:"center",background:T.surfaceAlt,borderRadius:T.radius,border:`1px solid ${T.border}`}}>

              {/* Per-tier, per-group breakdown */}
              {[1,2,3,4].map(tier=>{
                const tierGroups = groupKeys.filter(g=>g.tier===tier);

                  <div key={tier} style={{marginBottom:22}}>

                      <p style={{margin:0,fontSize:12,fontWeight:800,color:TIER_COLORS[tier],textTransform:"uppercase",letterSpacing:0.8}}>{TIER_LABELS[tier]}</p>

                    </div>

                    {tierGroups.map(({key,managerId})=>{
                      const groupMembers = ORG.filter(p=>p.tier===tier&&p.managerId===managerId);
                      const pool = groupMembers.reduce((s,p)=>s+Math.round(p.salary/12),0);
                      const mgr = managerId ? ORG.find(p=>p.id===managerId) : null;
                      const totalFactor = groupMembers.reduce((s,p)=>{
                        const g=reviews[p.id]?.mgrGrade;
                        return s+(g?(RATINGS.find(r=>r.grade===g)?.factor||0):0);
                      },0);
                      return (
                        <div key={key} style={{marginBottom:14,borderRadius:T.radius,border:`1px solid ${T.border}`,overflow:"hidden"}}>
                          {/* Group header */}
                          <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 14px",background:T.surfaceAlt,borderBottom:`1px solid ${T.border}`}}>
                            <span style={{fontSize:11,color:T.textMuted}}>
                              {mgr ? <>Group under <strong style={{color:T.text}}>{dn(mgr.id)}</strong></> : <strong style={{color:T.text}}>No Manager (CEO tier)</strong>}
                            </span>
                            <span style={{marginLeft:"auto",fontSize:11,fontWeight:700,color:T.green}}>Pool: ¥{pool.toLocaleString()}</span>
                            <span style={{fontSize:10,color:T.textMuted}}>{groupMembers.length} members</span>
                          </div>
                          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                            <thead>
                              <tr>{["Name","Grade","Factor","Share","Bonus","Monthly","Raise","New Salary"].map(h=>(
                                <th key={h} style={{padding:"6px 10px",textAlign:"left",fontSize:10,fontWeight:700,color:T.textMuted,borderBottom:`1px solid ${T.border}`,background:T.surface}}>{h}</th>
                              ))}</tr>
                            </thead>
                            <tbody>
                              {groupMembers.map(p=>{
                                const g=reviews[p.id]?.mgrGrade;
                                const factor=g?(RATINGS.find(r=>r.grade===g)?.factor||0):0;
                                const share=totalFactor>0?((factor/totalFactor)*100).toFixed(1):0;
                                const bonus=bonusMap[p.id]||0;
                                const raise=calcRaise(g,p.salary);
                                return (
                                  <tr key={p.id} style={{borderBottom:`1px solid ${T.border}`}}>
                                    <td style={{padding:"8px 10px"}}>
                                      <div style={{display:"flex",alignItems:"center",gap:6}}>
                                        <Avatar initials={p.avatar} size={22} color={TIER_COLORS[p.tier]}/>
                                        <span style={{color:T.text,fontWeight:600}}>{dn(p.id)}</span>
                                      </div>
                                    </td>
                                    <td style={{padding:"8px 10px"}}>{g?<span style={{fontWeight:900,fontSize:15,color:gradeColor[g]}}>{g}</span>:<span style={{color:T.textDim}}>—</span>}</td>
                                    <td style={{padding:"8px 10px",color:T.textMuted}}>{g?`×${factor}`:"—"}</td>
                                    <td style={{padding:"8px 10px"}}>
                                      {totalFactor>0&&g?(
                                        <div style={{display:"flex",alignItems:"center",gap:6}}>
                                          <div style={{width:50,height:6,background:T.border,borderRadius:3,overflow:"hidden"}}>
                                            <div style={{width:`${share}%`,height:"100%",background:gradeColor[g]||T.accent,borderRadius:3}}/>
                                          </div>
                                          <span style={{fontSize:10,color:T.textMuted}}>{share}%</span>
                                        </div>
                                      ):"—"}
                                    </td>
                                    <td style={{padding:"8px 10px"}}>{bonus>0?<span style={{color:T.green,fontWeight:700}}>¥{bonus.toLocaleString()} <span style={{fontSize:9,color:T.amber}}>advisory</span></span>:"—"}</td>
                                    <td style={{padding:"8px 10px",color:T.textMuted,fontSize:11}}>¥{Math.round(p.salary/12).toLocaleString()}</td>
                                    <td style={{padding:"8px 10px"}}>{raise?<span style={{color:T.blue,fontWeight:700}}>+{raise.pct}%</span>:"—"}</td>
                                    <td style={{padding:"8px 10px"}}>{raise?<span style={{color:T.text,fontWeight:700}}>¥{(p.salary+raise.amount).toLocaleString()} <span style={{fontSize:9,color:T.amber}}>advisory</span></span>:"—"}</td>
                                  </tr>
                                );
                              })}
                              {/* Pool summary row */}
                              <tr style={{background:`${T.green}08`}}>
                                <td colSpan={4} style={{padding:"6px 10px",fontSize:11,color:T.textMuted,fontStyle:"italic"}}>Group total</td>
                                <td style={{padding:"6px 10px",fontWeight:800,color:T.green,fontSize:12}}>
                                  ¥{groupMembers.reduce((s,p)=>s+(bonusMap[p.id]||0),0).toLocaleString()}
                                  <span style={{fontSize:9,color:T.textMuted,marginLeft:4}}>/ ¥{pool.toLocaleString()} pool</span>
                                </td>
                                <td colSpan={3}/>
                              </tr>
                            </tbody>
                          </table>
                        </div>
                      );
                    })}
                  </div>
                );
              })}
              <div style={{padding:"8px 12px",background:T.surfaceAlt,borderRadius:T.radiusSm,fontSize:11,color:T.textDim}}>
                * All figures are system-generated advisory suggestions. Final compensation requires management approval. Effective May 2026.
              </div>
            </Card>
          </>
        );
      })()}

      {/* Upward reviews */}
      {tab==="upward"&&(
        <div>
          <div style={{padding:"10px 14px",background:`${T.teal}0F`,borderRadius:T.radiusSm,border:`1px solid ${T.teal}33`,marginBottom:14,fontSize:12,color:T.teal}}>
            🔒 HR can view all upward review data and reviewer identities for calibration purposes only.
          </div>
          <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
            {ORG.filter(p=>p.tier<4).map(p=>{
              const cnt=(upwardReviews[p.id]||[]).length; const tc=TIER_COLORS[p.tier];
              return (
                <button key={p.id} onClick={()=>setMgrSel(p.id)} style={{
                  padding:"8px 12px",borderRadius:T.radius,fontFamily:"inherit",
                  border:`1.5px solid ${mgrSel===p.id?tc:T.border}`,
                  background:mgrSel===p.id?`${tc}18`:T.surface,
                  cursor:"pointer",fontSize:11,fontWeight:700,color:mgrSel===p.id?tc:T.text,
                  display:"flex",alignItems:"center",gap:6,
                }}>
                  <span>{dn(p.id)}</span>
                  <span style={{fontSize:10,padding:"1px 6px",borderRadius:4,background:cnt>0?tc:T.border,color:"#fff"}}>{cnt}</span>
                </button>
              );
            })}
          </div>
          {mgrUpward.length===0
            ?<Card><p style={{textAlign:"center",color:T.textMuted,padding:24,fontSize:13}}>No upward reviews submitted yet.</p></Card>
            :(
              <>
                <Card>
                  <SectionTitle sub={`${mgrUpward.length} responses`}>{ORG.find(p=>p.id===mgrSel)?.name} — Aggregated</SectionTitle>
                  {mgrAvgByDim.map(d=><ScoreBar key={d.key} label={d.label} value={d.avg} color={T.teal}/>)}
                </Card>
                <Card>
                  <SectionTitle sub="HR only">Reviewer Detail</SectionTitle>
                  {mgrUpward.map((r,i)=>{
                    const reviewer=ORG.find(p=>p.id===r.reviewerId);
                    return (
                      <div key={i} style={{padding:"12px 14px",background:T.surfaceAlt,borderRadius:T.radius,border:`1px solid ${T.border}`,marginBottom:10}}>
                        <div style={{display:"flex",justifyContent:"space-between",marginBottom:8,alignItems:"center"}}>

                          <Badge color={T.teal}>avg {avg(Object.values(r.scores))?.toFixed(1)}</Badge>

                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:4}}>
