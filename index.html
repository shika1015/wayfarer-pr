        </div>
      )}
    </div>
  );
}

// ── Cross-team Nomination Panel (employee side) ───────────────────────────────
function CrossNominationPanel({personId, nominations, setNominations, assignments, reviews, setReviews}) {
  const person = ORG.find(p=>p.id===personId);
  // Eligible: same tier, different team
  const eligible = ORG.filter(p => p.id!==personId && p.tier===person?.tier && p.team!==person?.team);
  const myNom = nominations[personId] || null;           // who I nominated
  const myAssigned = assignments[personId] || null;       // who HR assigned to review me
  const assignedReviewer = myAssigned ? ORG.find(p=>p.id===myAssigned) : null;

  // Reviewers assigned TO ME (nominatedBy + hrAssigned)
  const reviewersOfMe = Object.entries(assignments)
    .filter(([reviewee]) => reviewee === personId)
    .map(([,rid]) => ORG.find(p=>p.id===rid))
    .filter(Boolean);

  // Who I need to review (I was nominated by them OR HR assigned me to them)
  const iNeedToReview = ORG.filter(p => {
    const theirNom = nominations[p.id];
    const theirAssign = assignments[p.id];
    return theirNom===personId || theirAssign===personId;
  });

  // Cross review form state
  const [reviewTarget, setReviewTarget] = useState(null);
  const [crossScores, setCrossScores] = useState({clarity:3,delivery:3,collaboration:3,overall:3});

  const submitCrossReview = (targetId) => {
    const target = reviews[targetId];
    if (!target) return;
    const alreadyDone = target.crossReviews?.some(r=>r.reviewerId===personId);
    if (alreadyDone) return;
    const reviewer = ORG.find(p=>p.id===personId);
    const updated = {...target, crossReviews:[...(target.crossReviews||[]), {reviewerId:personId, reviewerName:reviewer?.name||"", scores:crossScores}]};
    setReviews(prev=>({...prev,[targetId]:updated}));
    setReviewTarget(null);
    setCrossScores({clarity:3,delivery:3,collaboration:3,overall:3});
  };

  const nominationLocked = !!assignments[personId]; // HR has assigned, lock nomination
  const phase = reviews[personId]?.phase;
  const canNominate = phase==="cross" || phase==="manager" || phase==="done";

  return (
    <div>
      {/* My nomination */}
      <Card>
        <SectionTitle sub="Choose 1 colleague from a different team, same level">🙋 My Nomination</SectionTitle>
        {nominationLocked ? (
          <div style={{padding:"10px 12px",background:`${T.green}18`,borderRadius:T.radiusSm,border:`1px solid ${T.green}44`,fontSize:12,color:T.green,marginBottom:12}}>
            ✅ Nominations locked — HR has started assignment.
          </div>
        ) : !canNominate ? (
          <div style={{padding:"10px 12px",background:T.surfaceAlt,borderRadius:T.radiusSm,fontSize:12,color:T.textMuted,marginBottom:12}}>
            ⏳ Available after your self review is submitted.
          </div>
        ) : null}
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:8}}>
          {eligible.map(e=>{
            const isSelected = myNom===e.id;
            return (
              <button key={e.id} onClick={()=>!nominationLocked&&canNominate&&setNominations(prev=>({...prev,[personId]:isSelected?null:e.id}))}
                style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",borderRadius:T.radius,fontFamily:"inherit",cursor:nominationLocked||!canNominate?"default":"pointer",
                  border:`1.5px solid ${isSelected?T.accent:T.border}`,background:isSelected?`${T.accent}18`:T.surfaceAlt}}>
                <Avatar initials={e.avatar} color={TIER_COLORS[e.tier]} size={26}/>
                <div style={{textAlign:"left"}}>
                  <p style={{margin:0,fontSize:12,fontWeight:700,color:T.text}}>{e.name}</p>
                  <p style={{margin:0,fontSize:10,color:T.textMuted}}>{e.team}</p>
                </div>
                {isSelected&&<span style={{color:T.accent,fontSize:12}}>✓</span>}
              </button>
            );
          })}
        </div>
        {myNom&&!nominationLocked&&<p style={{margin:0,fontSize:11,color:T.textMuted}}>Selected: <strong style={{color:T.accent}}>{ORG.find(p=>p.id===myNom)?.name}</strong> · waiting for HR to start assignment.</p>}
        {eligible.length===0&&<p style={{color:T.textMuted,fontSize:12}}>No eligible colleagues found (same tier, different team).</p>}
      </Card>

      {/* HR-assigned reviewer info */}
      <Card>
        <SectionTitle sub="HR randomly assigns 1 additional reviewer">🎲 HR-Assigned Reviewer</SectionTitle>
        {assignedReviewer ? (
          <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:T.surfaceAlt,borderRadius:T.radius,border:`1px solid ${T.border}`}}>
            <Avatar initials={assignedReviewer.avatar} color={TIER_COLORS[assignedReviewer.tier]} size={32}/>
            <div>
              <p style={{margin:0,fontSize:13,fontWeight:700,color:T.text}}>{assignedReviewer.name}</p>
              <p style={{margin:0,fontSize:11,color:T.textMuted}}>{assignedReviewer.title} · {assignedReviewer.team}</p>
            </div>
            <Badge color={T.purple} style={{marginLeft:"auto"}}>HR Assigned</Badge>
          </div>
        ) : (
          <p style={{color:T.textMuted,fontSize:12,padding:"8px 0"}}>⏳ HR has not yet run the assignment. Check back after the nomination deadline.</p>
        )}
      </Card>

      {/* Reviews I need to give */}
      {iNeedToReview.length>0&&(
        <Card>
          <SectionTitle sub="Complete anonymously for each person">{`📝 Reviews I Need to Give (${iNeedToReview.length})`}</SectionTitle>
          {iNeedToReview.map(target=>{
            const alreadyDone = reviews[target.id]?.crossReviews?.some(r=>r.reviewerId===personId);
            const isOpen = reviewTarget===target.id;
            return (
              <div key={target.id} style={{marginBottom:10}}>
                <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:T.surfaceAlt,borderRadius:T.radius,border:`1px solid ${alreadyDone?T.green:T.border}`}}>
                  <Avatar initials={target.avatar} color={TIER_COLORS[target.tier]} size={28}/>
                  <div style={{flex:1}}>
                    <p style={{margin:0,fontSize:12,fontWeight:700,color:T.text}}>{target.name}</p>
                    <p style={{margin:0,fontSize:10,color:T.textMuted}}>{target.team}</p>
                  </div>
                  {alreadyDone
                    ? <Badge color={T.green}>✅ Submitted</Badge>
                    : <Btn small onClick={()=>setReviewTarget(isOpen?null:target.id)}>
                        {isOpen?"Cancel":"Start Review"}
                      </Btn>
                  }
                </div>
                {isOpen&&!alreadyDone&&(
                  <div style={{padding:"14px 16px",background:T.surfaceAlt,borderRadius:`0 0 ${T.radius} ${T.radius}`,border:`1px solid ${T.border}`,borderTop:"none",marginTop:-2}}>
                    <p style={{margin:"0 0 12px",fontSize:12,color:T.textMuted}}>Focus on project collaboration — your identity is hidden from the recipient.</p>
                    {[{k:"clarity",l:"Communication Clarity"},{k:"delivery",l:"Delivery & Follow-through"},{k:"collaboration",l:"Collaboration Quality"},{k:"overall",l:"Overall Contribution"}].map(({k,l})=>(
                      <Slider key={k} label={l} weight={0.25} value={crossScores[k]} onChange={v=>setCrossScores(p=>({...p,[k]:v}))}/>
                    ))}
                    <Btn onClick={()=>submitCrossReview(target.id)}>Submit Anonymous Review</Btn>
                  </div>
                )}
              </div>
            );
          })}
        </Card>
      )}

      {/* My cross score summary */}
      {reviews[personId]?.crossReviews?.length>0&&(
        <Card>
          <SectionTitle sub={`${reviews[personId].crossReviews.length} review(s) received · average used as 20% weight`}>📊 My Cross-team Score</SectionTitle>
          {reviews[personId].crossReviews.map((cr,i)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 10px",background:T.surfaceAlt,borderRadius:T.radiusSm,border:`1px solid ${T.border}`,marginBottom:6,fontSize:12}}>
              <span style={{color:T.textMuted}}>Reviewer {i+1} {i===0?"(Nominated)":"(HR Assigned)"}</span>
              <span style={{fontWeight:700,color:T.accent}}>Overall: {cr.scores.overall}/5</span>
            </div>
          ))}
          <div style={{marginTop:8,padding:"10px 12px",background:`${T.accent}12`,borderRadius:T.radiusSm,border:`1px solid ${T.accent}33`}}>
            <span style={{fontSize:13,fontWeight:700,color:T.accent}}>
              Average: {(reviews[personId].crossReviews.reduce((a,x)=>a+x.scores.overall,0)/reviews[personId].crossReviews.length).toFixed(2)} / 5.00
            </span>
            <span style={{fontSize:11,color:T.textMuted,marginLeft:8}}>→ counts as 20% of final score</span>
          </div>
        </Card>
      )}
    </div>
  );
}

// ── HR Cross Assignment Panel ─────────────────────────────────────────────────
function HRCrossAssignPanel({nominations, assignments, setAssignments, reviews}) {
  const [log, setLog] = useState([]);
  const [done, setDone] = useState(Object.keys(assignments).length > 0);

  const runAssignment = () => {
    const newAssignments = {...assignments};
    const newLog = [];

    // For each person who needs a cross review (tier 2-4, phase=cross or later)
    const targets = ORG.filter(p => p.tier > 1);

    targets.forEach(person => {
      if (newAssignments[person.id]) return; // already assigned
      const nominated = nominations[person.id]; // person they nominated

      // Pool: same tier, different team, not self, not the nominated person
      const pool = ORG.filter(p =>
        p.id !== person.id &&
        p.tier === person.tier &&
        p.team !== person.team &&
        p.id !== nominated
      );

      if (pool.length === 0) {
        newLog.push({person:person.name, assigned:"No eligible reviewer found", color:T.red});
        return;
      }

      // Random pick
      const pick = pool[Math.floor(Math.random() * pool.length)];
      newAssignments[person.id] = pick.id;
      newLog.push({
        person: person.name,
        nominated: nominated ? ORG.find(p=>p.id===nominated)?.name : "None",
        assigned: pick.name,
        color: T.green,
      });
    });

    setAssignments(newAssignments);
    setLog(newLog);
    setDone(true);
  };

  return (
    <Card glow={!done}>
      <SectionTitle sub="Runs once per cycle · assigns 1 random reviewer per person (excluding their nomination)">
        🎲 Cross-team Assignment
      </SectionTitle>

      {/* Summary table — HR Assigned column is editable after assignment */}
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,marginBottom:14}}>
        <thead>
          <tr>{["Employee","Tier","Nominated","HR Assigned","Status"].map(h=>(
            <th key={h} style={{padding:"7px 10px",textAlign:"left",fontSize:10,fontWeight:700,color:T.textMuted,borderBottom:`1px solid ${T.border}`}}>{h}</th>
          ))}</tr>
        </thead>
        <tbody>
          {ORG.filter(p=>p.tier>1).map(p=>{
            const nom = nominations[p.id]; const asgn = assignments[p.id];
            const nomPerson = nom ? ORG.find(x=>x.id===nom) : null;
            const asgnPerson = asgn ? ORG.find(x=>x.id===asgn) : null;
            // Eligible options for HR to pick: same tier, diff team, not self, not nominated
            const eligible = ORG.filter(x =>
              x.id !== p.id &&
              x.tier === p.tier &&
              x.team !== p.team &&
              x.id !== nom
            );
            return (
              <tr key={p.id} style={{borderBottom:`1px solid ${T.border}`}}>
                <td style={{padding:"8px 10px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <Avatar initials={p.avatar} size={22} color={TIER_COLORS[p.tier]}/>
                    <span style={{color:T.text,fontWeight:600}}>{p.name}</span>
                  </div>
                </td>
                <td style={{padding:"8px 10px"}}><Badge color={TIER_COLORS[p.tier]}>{TIER_LABELS[p.tier]}</Badge></td>
                <td style={{padding:"8px 10px",color:nomPerson?T.text:T.textDim}}>{nomPerson?.name||"—"}</td>
                <td style={{padding:"6px 10px"}}>
                  {done ? (
                    <select
                      value={asgn||""}
                      onChange={e => setAssignments(prev=>({...prev,[p.id]:e.target.value||undefined}))}
                      style={{
                        background:T.surfaceAlt, color:asgn?T.purple:T.textDim,
                        border:`1px solid ${asgn?T.purple:T.border}`, borderRadius:T.radiusSm,
                        padding:"4px 8px", fontSize:11, fontFamily:"inherit", fontWeight:asgn?700:400,
                        cursor:"pointer", outline:"none", minWidth:120,
                      }}
                    >
                      <option value="">— Unassign —</option>
                      {eligible.map(x=>(
                        <option key={x.id} value={x.id}>{x.name} ({x.team})</option>
                      ))}
                    </select>
                  ) : (
                    <span style={{color:T.textDim}}>—</span>
                  )}
                </td>
                <td style={{padding:"8px 10px"}}>
                  {asgn
                    ? <Badge color={T.green}>Assigned</Badge>
                    : nom ? <Badge color={T.amber}>Nominated only</Badge>
                    : <Badge color={T.textMuted}>Pending</Badge>
                  }
                </td>
              </tr>
            );
          })}
        </tbody>
      </table>

      {!done ? (
        <div>
          <div style={{padding:"10px 14px",background:`${T.amber}12`,border:`1px solid ${T.amber}33`,borderRadius:T.radiusSm,marginBottom:12,fontSize:11,color:T.amber}}>
            ⚠️ This action assigns a random reviewer for each employee. Each person will receive 2 cross-team reviewers: their nomination + HR's assignment. Run once per cycle.
          </div>
          <Btn onClick={runAssignment} style={{background:T.purple,color:"#fff",border:"none"}}>
            🎲 Run Assignment Now
          </Btn>
        </div>
      ) : (
        <>
          <div style={{padding:"10px 14px",background:`${T.green}18`,border:`1px solid ${T.green}44`,borderRadius:T.radiusSm,marginBottom:12,fontSize:12,color:T.green}}>
            ✅ Assignment complete · {Object.keys(assignments).length} employees assigned.
          </div>
          {log.length>0&&(
            <div style={{maxHeight:180,overflowY:"auto"}}>
              {log.map((l,i)=>(
                <div key={i} style={{display:"flex",gap:8,fontSize:11,padding:"4px 0",borderBottom:`1px solid ${T.border}`}}>
                  <span style={{color:T.text,fontWeight:600,minWidth:100}}>{l.person}</span>
                  <span style={{color:T.textMuted}}>Nom: {l.nominated}</span>
                  <span style={{color:T.purple}}>+ HR: {l.assigned}</span>
                </div>
              ))}
            </div>
          )}
        </>
      )}
    </Card>
  );
}

// ── Supabase client ───────────────────────────────────────────────────────────
const SUPABASE_URL = "https://xmkckwmlbzlukrexrpot.supabase.co";
const SUPABASE_KEY = "sb_publishable_I7BT8MpD91YGdN5rU06_MA_3rXES7dC";
const CYCLE_ID    = "2026H1";

// Lazy-load Supabase SDK from CDN
let _sb = null;
const sb = async () => {
  if (_sb) return _sb;
  if (!window.__supabaseLib) {
    await new Promise((res, rej) => {
      const s = document.createElement("script");
      s.src = "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js";
      s.onload = res; s.onerror = rej;
      document.head.appendChild(s);
    });
  }
  _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  return _sb;
};

// ── DB helpers ────────────────────────────────────────────────────────────────
const db = {
  // Auth
  sendMagicLink: async (email) => {
    const c = await sb();
    return c.auth.signInWithOtp({ email, options: { emailRedirectTo: window.location.origin + window.location.pathname } });
  },
  getSession: async () => { const c = await sb(); return c.auth.getSession(); },
  onAuthChange: async (cb) => { const c = await sb(); return c.auth.onAuthStateChange(cb); },
  signOut: async () => { const c = await sb(); return c.auth.signOut(); },

  // Employee lookup by email
  getEmployeeByEmail: async (email) => {
    const c = await sb();
    const { data } = await c.from("employees").select("*").eq("email", email).single();
    return data;
  },

  // All employees (for HR / org chart)
  getEmployees: async () => {
    const c = await sb();
    const { data } = await c.from("employees").select("*");
    return data || [];
  },

  // Reviews for current cycle
  getReviews: async () => {
    const c = await sb();
    const { data } = await c.from("reviews").select("*").eq("cycle_id", CYCLE_ID);
    // Convert array to {emp_id: review} map
    return Object.fromEntries((data||[]).map(r => [r.emp_id, r]));
  },

  upsertReview: async (empId, patch) => {
    const c = await sb();
    return c.from("reviews").upsert({ emp_id: empId, cycle_id: CYCLE_ID, ...patch }, { onConflict: "emp_id,cycle_id" });
  },

  // Upward reviews
  getUpwardReviews: async () => {
    const c = await sb();
    const { data } = await c.from("upward_reviews").select("*").eq("cycle_id", CYCLE_ID);
    const map = {};
    (data||[]).forEach(r => { if (!map[r.manager_id]) map[r.manager_id] = []; map[r.manager_id].push(r); });
    return map;
  },

  upsertUpward: async (row) => {
    const c = await sb();
    return c.from("upward_reviews").upsert(row, { onConflict: "manager_id,reviewer_id,cycle_id" });
  },

  // Nominations
  getNominations: async () => {
    const c = await sb();
    const { data } = await c.from("nominations").select("*").eq("cycle_id", CYCLE_ID);
    const map = {};
    (data||[]).forEach(r => { map[r.nominator_id] = r.nominee_id; });
    return map;
  },

  upsertNomination: async (nominatorId, nomineeId) => {
    const c = await sb();
    return c.from("nominations").upsert({ nominator_id: nominatorId, nominee_id: nomineeId, cycle_id: CYCLE_ID }, { onConflict: "nominator_id,cycle_id" });
  },

  // Assignments
  getAssignments: async () => {
    const c = await sb();
    const { data } = await c.from("assignments").select("*").eq("cycle_id", CYCLE_ID);
    const map = {};
    (data||[]).forEach(r => { map[r.reviewer_id] = r.target_id; });
    return map;
  },

  upsertAssignment: async (reviewerId, targetId) => {
    const c = await sb();
    return c.from("assignments").upsert({ reviewer_id: reviewerId, target_id: targetId, cycle_id: CYCLE_ID }, { onConflict: "reviewer_id,cycle_id" });
  },

  setAllAssignments: async (assignMap) => {
    const c = await sb();
    const rows = Object.entries(assignMap).map(([rid, tid]) => ({ reviewer_id: rid, target_id: tid, cycle_id: CYCLE_ID }));
    return c.from("assignments").upsert(rows, { onConflict: "reviewer_id,cycle_id" });
  },

  // Org overrides
  getOrgOverrides: async () => {
    const c = await sb();
    const { data } = await c.from("org_overrides").select("*");
    const map = {};
    (data||[]).forEach(r => { map[r.emp_id] = { title: r.title, tier: r.tier, managerId: r.manager_id }; });
    return map;
  },

  upsertOrgOverride: async (empId, patch) => {
    const c = await sb();
    return c.from("org_overrides").upsert({ emp_id: empId, ...patch }, { onConflict: "emp_id" });
  },

  deleteOrgOverride: async (empId) => {
    const c = await sb();
    return c.from("org_overrides").delete().eq("emp_id", empId);
  },

  // Name overrides (stored in employees.display_name)
  setDisplayName: async (empId, name) => {
    const c = await sb();
    return c.from("employees").update({ display_name: name }).eq("emp_id", empId);
  },

  // HR: send magic link invite to employee
  inviteEmployee: async (empId, email) => {
    const c = await sb();
    // Update email in employees table first
    await c.from("employees").update({ email }).eq("emp_id", empId);
    return db.sendMagicLink(email);
  },
};

// ── App Shell ─────────────────────────────────────────────────────────────────
function App() {
  const [authState, setAuthState]       = useState("loading"); // loading | unauthenticated | authenticated
  const [currentUser, setCurrentUser]   = useState(null);      // Supabase user object
  const [employee, setEmployee]         = useState(null);      // employees row
  const [dbLoaded, setDbLoaded]         = useState(false);

  // App data
  const [reviews, setReviewsRaw]        = useState({});
  const [upwardReviews, setUpwardRaw]   = useState({});
  const [nominations, setNomRaw]        = useState({});
  const [assignments, setAssignRaw]     = useState({});
  const [nameOverrides, setNamesRaw]    = useState({});
  const [orgOverrides, setOrgRaw]       = useState({});

  // HR impersonation
  const [impersonating, setImpersonating]                 = useState(null);
  const [showImpersonatePicker, setShowImpersonatePicker] = useState(false);
  const [impersonateSearch, setImpersonateSearch]         = useState("");
  const [mainTab, setMainTab]                             = useState("myreview");

  // ── Auth listener ──────────────────────────────────────────────────────────
  useEffect(() => {
    let sub;
    (async () => {
      const { data: { session } } = await db.getSession();
      if (session?.user) {
        setCurrentUser(session.user);
        await loadEmployee(session.user.email);
      } else {
        setAuthState("unauthenticated");
      }
      const { data } = await db.onAuthChange(async (event, session) => {
        if (session?.user) {
          setCurrentUser(session.user);
          await loadEmployee(session.user.email);
        } else {
          setCurrentUser(null);
          setEmployee(null);
          setAuthState("unauthenticated");
        }
      });
      sub = data.subscription;
    })();
    return () => sub?.unsubscribe();
  }, []);

  const loadEmployee = async (email) => {
    const emp = await db.getEmployeeByEmail(email);
    setEmployee(emp);
    setAuthState("authenticated");
    await loadAllData();
  };

  const loadAllData = async () => {
    const [rv, up, nm, as, oo] = await Promise.all([
      db.getReviews(),
      db.getUpwardReviews(),
      db.getNominations(),
      db.getAssignments(),
      db.getOrgOverrides(),
    ]);
    setReviewsRaw(rv);
    setUpwardRaw(up);
    setNomRaw(nm);
    setAssignRaw(as);
    setOrgRaw(oo);
    setDbLoaded(true);
  };

  // ── Data write helpers (update local state + persist to DB) ────────────────
  const setReviews = async (v) => {
    setReviewsRaw(v);
    // v is the full map; find changed entries and upsert
    await Promise.all(Object.entries(v).map(([empId, rev]) => db.upsertReview(empId, rev)));
  };

  const setReview = async (empId, patch) => {
    const updated = { ...reviews, [empId]: { ...reviews[empId], ...patch } };
    setReviewsRaw(updated);
    await db.upsertReview(empId, patch);
  };

  const setUpwardReviews = async (v) => { setUpwardRaw(v); };
  const addUpwardReview  = async (row) => {
    const updated = { ...upwardReviews };
    if (!updated[row.manager_id]) updated[row.manager_id] = [];
    updated[row.manager_id] = [...updated[row.manager_id], row];
    setUpwardRaw(updated);
    await db.upsertUpward({ ...row, cycle_id: CYCLE_ID });
  };

  const setNominations = async (v) => {
    setNomRaw(v);
    await Promise.all(Object.entries(v).map(([nid, eid]) => db.upsertNomination(nid, eid)));
  };

  const setAssignments = async (v) => {
    setAssignRaw(v);
    await db.setAllAssignments(v);
  };

  const setNameOverrides = async (v) => {
    setNamesRaw(v);
    // Persist each changed display name
    await Promise.all(Object.entries(v).map(([id, name]) => db.setDisplayName(id, name)));
  };

  const setOrgOverrides = async (v) => {
    setOrgRaw(v);
    await Promise.all(Object.entries(v).map(([id, o]) =>
      db.upsertOrgOverride(id, { title: o.title, tier: o.tier, manager_id: o.managerId })
    ));
  };

  // ── Derived identity ───────────────────────────────────────────────────────
  const isHR           = employee?.is_hr === true;
  const effectivePerson = isHR && impersonating
    ? ORG.find(p => p.id === impersonating)
    : employee ? ORG.find(p => p.emp_id === employee.emp_id || p.id === employee.emp_id) : null;
  const effectiveIsHR  = isHR && !impersonating;

  const displayName = (id) => nameOverrides[id] || ORG.find(p=>p.id===id)?.name || "";
  const stopImpersonate = () => { setImpersonating(null); setMainTab("myreview"); setShowImpersonatePicker(false); };

  const activePerson = effectivePerson;
  const reports = activePerson ? getDirectReports(activePerson.id) : [];
  const isCEO   = activePerson?.tier === 1;

  const tabs = effectiveIsHR ? [] : isCEO ? [
    {id:"myreview", label:"👑 My Status & Team"},
  ] : [
    {id:"myreview", label:"✍️ My Review"},
    ...(reports.length>0 ? [{id:"team", label:`👥 My Team (${reports.length})`}] : []),
    {id:"cross",  label:"🔗 Cross-team"},
    {id:"upward", label:"⬆️ Upward Review"},
  ];

  const renderContent = () => {
    if (effectiveIsHR) return <HRView reviews={reviews} setReviews={setReviews} upwardReviews={upwardReviews} nominations={nominations} assignments={assignments} setAssignments={setAssignments} nameOverrides={nameOverrides} setNameOverrides={setNameOverrides} orgOverrides={orgOverrides} setOrgOverrides={setOrgOverrides} dbHelpers={db} loadAllData={loadAllData}/>;
    if (!activePerson) return <div style={{padding:40,textAlign:"center",color:T.textMuted}}>Your account is not linked to an employee profile. Please contact HR.</div>;
    if (mainTab==="myreview") return <SelfReviewPanel personId={activePerson.id} reviews={reviews} setReviews={(v)=>setReview(activePerson.id, v[activePerson.id]||v)} nameOverrides={nameOverrides} setNameOverrides={setNameOverrides}/>;
    if (mainTab==="team")     return <ReportingView   personId={activePerson.id} reviews={reviews} setReviews={setReviews} nameOverrides={nameOverrides}/>;
    if (mainTab==="cross")    return <CrossNominationPanel personId={activePerson.id} nominations={nominations} setNominations={setNominations} assignments={assignments} reviews={reviews} setReviews={setReviews} nameOverrides={nameOverrides}/>;
    if (mainTab==="upward")   return <UpwardReviewForm personId={activePerson.id} reviews={reviews} setReviews={setReviews} upwardReviews={upwardReviews} setUpwardReviews={setUpwardReviews} addUpwardReview={addUpwardReview}/>;
    return null;
  };

  const filteredOrg = impersonateSearch
    ? ORG.filter(p => p.name.toLowerCase().includes(impersonateSearch.toLowerCase()) || p.title.toLowerCase().includes(impersonateSearch.toLowerCase()) || p.id.includes(impersonateSearch))
    : ORG;

  // ── Loading ────────────────────────────────────────────────────────────────
  if (authState === "loading") return (
    <div style={{minHeight:"100vh",background:T.bg,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
      <div style={{width:40,height:40,border:`3px solid ${T.border}`,borderTop:`3px solid ${T.accent}`,borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
      <p style={{color:T.textMuted,fontSize:13}}>Loading…</p>
    </div>
  );

  // ── Login screen ───────────────────────────────────────────────────────────
  if (authState === "unauthenticated") return <LoginScreen/>;

  // ── Authenticated but data still loading ──────────────────────────────────
  if (!dbLoaded) return (
    <div style={{minHeight:"100vh",background:T.bg,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
      <div style={{width:40,height:40,border:`3px solid ${T.border}`,borderTop:`3px solid ${T.accent}`,borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
      <p style={{color:T.textMuted,fontSize:13}}>Loading review data…</p>
    </div>
  );

  // ── Main app ───────────────────────────────────────────────────────────────
  return (
    <div style={{minHeight:"100vh",background:T.bg,fontFamily:"'Inter',system-ui,sans-serif",color:T.text}}>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>

      {/* Top nav */}
      <div style={{background:T.surface,borderBottom:`1px solid ${T.border}`,padding:"10px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:10}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:28,height:28,borderRadius:6,background:`${T.accent}22`,border:`1px solid ${T.accent}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>✈️</div>
          <div>
            <p style={{margin:0,fontSize:13,fontWeight:800,color:T.text}}>Wayfarer PR</p>
            <p style={{margin:0,fontSize:10,color:T.textMuted}}>2026 H1</p>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {effectiveIsHR && (
            <button onClick={()=>setShowImpersonatePicker(v=>!v)} style={{display:"flex",alignItems:"center",gap:6,padding:"6px 12px",borderRadius:T.radius,border:`1px solid ${T.border}`,background:T.surfaceAlt,cursor:"pointer",fontSize:11,fontWeight:700,color:T.textMuted,fontFamily:"inherit"}}>
              👁 View As Employee
            </button>
          )}
          {effectivePerson && (
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <Avatar initials={effectivePerson.avatar} color={TIER_COLORS[effectivePerson.tier]} size={30}/>
              <div style={{textAlign:"right"}}>
                <p style={{margin:0,fontSize:12,fontWeight:700,color:T.text}}>{displayName(effectivePerson.id)}</p>
                <p style={{margin:0,fontSize:10,color:T.textMuted}}>{effectivePerson.title}</p>
              </div>
            </div>
          )}
          {effectiveIsHR && <Badge color={T.purple}>HR Admin</Badge>}
          <button onClick={()=>db.signOut()} style={{padding:"5px 10px",borderRadius:T.radiusSm,border:`1px solid ${T.border}`,background:"transparent",cursor:"pointer",fontSize:11,color:T.textMuted,fontFamily:"inherit"}}>Sign out</button>
        </div>
      </div>

      {/* Impersonation picker */}
      {showImpersonatePicker && effectiveIsHR && (
        <div style={{background:`${T.amber}18`,borderBottom:`1px solid ${T.amber}44`,padding:"10px 20px"}}>
          <div style={{maxWidth:900,margin:"0 auto",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
            <span style={{fontSize:12,color:T.amber,fontWeight:700}}>👁 View as:</span>
            <input value={impersonateSearch} onChange={e=>setImpersonateSearch(e.target.value)} placeholder="Search name, title, or ID…"
              style={{flex:1,minWidth:200,padding:"5px 10px",background:T.surfaceAlt,border:`1px solid ${T.border}`,borderRadius:T.radiusSm,color:T.text,fontSize:12,fontFamily:"inherit",outline:"none"}}/>
            {impersonateSearch && filteredOrg.slice(0,8).map(p=>(
              <button key={p.id} onClick={()=>{setImpersonating(p.id);setShowImpersonatePicker(false);setImpersonateSearch("");setMainTab("myreview");}}
                style={{display:"flex",alignItems:"center",gap:6,padding:"5px 10px",borderRadius:T.radiusSm,border:`1px solid ${T.border}`,background:T.surface,cursor:"pointer",fontFamily:"inherit"}}>
                <Avatar initials={p.avatar} size={20} color={TIER_COLORS[p.tier]}/>
                <span style={{fontSize:11,color:T.text}}>{p.name}</span>
                <span style={{fontSize:10,color:T.textMuted}}>{p.title}</span>
              </button>
            ))}
            <button onClick={()=>setShowImpersonatePicker(false)} style={{padding:"5px 10px",borderRadius:T.radiusSm,border:"none",background:"transparent",cursor:"pointer",fontSize:11,color:T.textMuted,fontFamily:"inherit"}}>✕</button>
          </div>
        </div>
      )}

      {/* Impersonation banner */}
      {isHR && impersonating && (
        <div style={{background:`${T.amber}18`,borderBottom:`1px solid ${T.amber}44`,padding:"8px 20px",display:"flex",alignItems:"center",gap:12}}>
          <span style={{fontSize:12,color:T.amber,fontWeight:700}}>👁 Viewing as {displayName(impersonating)}</span>
          <span style={{fontSize:11,color:T.textMuted}}>— Read-only preview</span>
          <button onClick={stopImpersonate} style={{marginLeft:"auto",padding:"4px 10px",borderRadius:T.radiusSm,border:`1px solid ${T.amber}44`,background:"transparent",cursor:"pointer",fontSize:11,color:T.amber,fontFamily:"inherit"}}>← Back to HR</button>
        </div>
      )}

      <div style={{maxWidth:900,margin:"0 auto",padding:"20px 16px"}}>
        {!effectiveIsHR && tabs.length>0 && (
          <div style={{display:"flex",gap:2,marginBottom:16,background:T.surfaceAlt,borderRadius:T.radius,padding:4}}>
            {tabs.map(t=>(
              <button key={t.id} onClick={()=>setMainTab(t.id)} style={{
                flex:1,padding:"8px 10px",borderRadius:T.radiusSm,border:"none",cursor:"pointer",
                fontSize:12,fontWeight:700,fontFamily:"inherit",
                background:mainTab===t.id?T.surface:"transparent",
                color:mainTab===t.id?T.accent:T.textMuted,
              }}>{t.label}</button>
            ))}
          </div>
        )}
        {renderContent()}
      </div>

      {/* HR invite panel */}
      {effectiveIsHR && <HRInvitePanel nameOverrides={nameOverrides} dbHelpers={db}/>}
    </div>
  );
}

// ── Login Screen ──────────────────────────────────────────────────────────────
function LoginScreen() {
  const [email, setEmail]   = useState("");
  const [sent, setSent]     = useState(false);
  const [loading, setLoading] = useState(false);
  const [error, setError]   = useState("");

  const submit = async () => {
    if (!email.includes("@")) { setError("Please enter a valid email address."); return; }
    setLoading(true); setError("");
    const { error: err } = await db.sendMagicLink(email);
    setLoading(false);
    if (err) { setError(err.message); return; }
    setSent(true);
  };

  return (
    <div style={{minHeight:"100vh",background:T.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:20,fontFamily:"'Inter',system-ui,sans-serif"}}>
      <div style={{background:T.surface,borderRadius:T.radiusLg,padding:44,maxWidth:420,width:"100%",border:`1px solid ${T.border}`,boxShadow:T.shadowMd}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{width:60,height:60,borderRadius:"50%",background:`${T.accent}22`,border:`2px solid ${T.accent}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,margin:"0 auto 16px"}}>✈️</div>
          <h2 style={{margin:"0 0 6px",color:T.text,fontSize:22,fontWeight:800}}>Wayfarer</h2>
          <p style={{margin:0,color:T.textMuted,fontSize:13}}>Performance Review · 2026 H1</p>
        </div>

        {sent ? (
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:44,marginBottom:16}}>📬</div>
            <p style={{color:T.text,fontWeight:700,fontSize:15,margin:"0 0 8px"}}>Check your inbox</p>
            <p style={{color:T.textMuted,fontSize:13,margin:"0 0 20px"}}>We sent a login link to <strong style={{color:T.text}}>{email}</strong>. It expires in 24 hours.</p>
            <button onClick={()=>setSent(false)} style={{fontSize:12,color:T.textMuted,background:"none",border:"none",cursor:"pointer",textDecoration:"underline"}}>Use a different email</button>
          </div>
        ) : (
          <>
            <p style={{color:T.textMuted,fontSize:13,marginBottom:20,textAlign:"center"}}>Enter your work email to receive a one-time login link. No password needed.</p>
            <label style={{fontSize:11,fontWeight:700,color:T.textMuted,display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:0.8}}>Work Email</label>
            <input
              type="email" value={email} onChange={e=>setEmail(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&submit()}
              placeholder="you@wayfarer-group.com"
              style={{width:"100%",padding:"11px 14px",background:T.surfaceAlt,border:`1px solid ${error?T.red:T.border}`,borderRadius:T.radius,color:T.text,fontSize:14,fontFamily:"inherit",outline:"none",boxSizing:"border-box",marginBottom:error?6:16}}
            />
            {error && <p style={{color:T.red,fontSize:12,margin:"0 0 14px"}}>{error}</p>}
            <button onClick={submit} disabled={loading} style={{width:"100%",padding:"12px",background:T.accent,border:"none",borderRadius:T.radius,color:"#fff",fontSize:14,fontWeight:700,cursor:loading?"not-allowed":"pointer",fontFamily:"inherit",opacity:loading?0.7:1}}>
              {loading ? "Sending…" : "Send Login Link →"}
            </button>
          </>
        )}
      </div>
    </div>
  );
}

// ── HR Invite Panel ───────────────────────────────────────────────────────────
function HRInvitePanel({ nameOverrides, dbHelpers }) {
  const dn = (id) => nameOverrides?.[id] || ORG.find(p=>p.id===id)?.name || "";
  const [open, setOpen]         = useState(false);
  const [emails, setEmails]     = useState({});   // {empId: email}
  const [sending, setSending]   = useState({});
  const [sent, setSentMap]      = useState({});
  const [search, setSearch]     = useState("");

  const filtered = search ? ORG.filter(p => p.name.toLowerCase().includes(search.toLowerCase()) || p.id.includes(search)) : ORG;

  const sendInvite = async (empId) => {
    const email = emails[empId]?.trim();
    if (!email?.includes("@")) return;
    setSending(s=>({...s,[empId]:true}));
    await dbHelpers.inviteEmployee(empId, email);
    setSending(s=>({...s,[empId]:false}));
    setSentMap(s=>({...s,[empId]:true}));
  };

  const sendAll = async () => {
    const pending = Object.entries(emails).filter(([id, em]) => em?.includes("@") && !sent[id]);
    for (const [id, em] of pending) await sendInvite(id);
  };

  return (
    <div style={{borderTop:`1px solid ${T.border}`,background:T.surface}}>
      <div style={{maxWidth:900,margin:"0 auto",padding:"12px 16px"}}>
        <button onClick={()=>setOpen(v=>!v)} style={{display:"flex",alignItems:"center",gap:8,background:"none",border:"none",cursor:"pointer",color:T.textMuted,fontFamily:"inherit",fontSize:12,fontWeight:700,padding:0}}>
          ✉️ Employee Invites {open?"▲":"▼"}
        </button>
        {open && (
          <div style={{marginTop:12}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,flexWrap:"wrap",gap:8}}>
              <p style={{margin:0,fontSize:11,color:T.textMuted}}>Enter each employee's work email and send their Magic Link invite.</p>
              <div style={{display:"flex",gap:8}}>
                <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Filter employees…"
                  style={{padding:"5px 10px",background:T.surfaceAlt,border:`1px solid ${T.border}`,borderRadius:T.radiusSm,color:T.text,fontSize:11,fontFamily:"inherit",outline:"none"}}/>
                <button onClick={sendAll} style={{padding:"5px 14px",background:`${T.accent}22`,border:`1px solid ${T.accent}44`,borderRadius:T.radiusSm,color:T.accent,fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
                  Send All →
                </button>
              </div>
            </div>
            <div style={{display:"grid",gap:4,maxHeight:480,overflowY:"auto"}}>
              {filtered.map(p => (
                <div key={p.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",background:T.surfaceAlt,borderRadius:T.radiusSm,border:`1px solid ${sent[p.id]?T.green+"44":T.border}`}}>
                  <Avatar initials={p.avatar} size={26} color={TIER_COLORS[p.tier]}/>
                  <div style={{minWidth:160}}>
                    <p style={{margin:0,fontSize:12,fontWeight:600,color:T.text}}>{dn(p.id)}</p>
                    <p style={{margin:0,fontSize:10,color:T.textMuted}}>{p.title} · <span style={{fontFamily:"monospace"}}>#{p.id}</span></p>
                  </div>
                  <input
                    type="email"
                    value={emails[p.id]||""}
                    onChange={e=>setEmails(m=>({...m,[p.id]:e.target.value}))}
                    onKeyDown={e=>e.key==="Enter"&&sendInvite(p.id)}
                    placeholder="work@wayfarer-group.com"
                    disabled={sent[p.id]}
                    style={{flex:1,padding:"5px 10px",background:T.surface,border:`1px solid ${T.border}`,borderRadius:T.radiusSm,color:T.text,fontSize:11,fontFamily:"inherit",outline:"none",opacity:sent[p.id]?0.5:1}}
                  />
                  <button
                    onClick={()=>sendInvite(p.id)}
                    disabled={sending[p.id]||sent[p.id]||!emails[p.id]?.includes("@")}
                    style={{padding:"5px 14px",background:sent[p.id]?`${T.green}22`:`${T.accent}22`,border:`1px solid ${sent[p.id]?T.green+"44":T.accent+"44"}`,borderRadius:T.radiusSm,color:sent[p.id]?T.green:T.accent,fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap",opacity:(sending[p.id]||(!sent[p.id]&&!emails[p.id]?.includes("@")))?0.5:1}}>
                    {sent[p.id] ? "✅ Sent" : sending[p.id] ? "…" : "Send →"}
                  </button>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}



const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
  </script>
